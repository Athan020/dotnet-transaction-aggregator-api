
include:
  - infra-compose.yml

services:
  ingestion-service:
    build: 
      context: .
      dockerfile: ./ingestion-service/Dockerfile
    ports:
      - "5100:5000"
    environment:
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  categorization-engine:
    build:
      context: .
      dockerfile: ./categorization-engine/Dockerfile
    ports:
      - "5212:5000"
    
    environment:
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'transaction-aggregator'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'transaction-api'
    static_configs:
      - targets: ['transaction-aggregator-api:80']
    metrics_path: '/metrics'
    scrape_interval: 5s

  - job_name: 'transaction-simulator'
    static_configs:
      - targets: ['transaction-simulator:80']
    metrics_path: '/metrics'
    scrape_interval: 5s

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']

  - job_name: 'transaction-sync-service'
    static_configs:
      - targets: ['transaction-sync-service:8080']
    metrics_path: '/metrics'
    scrape_interval: 5s

  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:14269']
